# STAR Attack Simulation Inventory
# Defines the hosts Ansible orchestrates for attack scenarios.

all:
  hosts:
    localhost:
      ansible_connection: local
      ansible_python_interpreter: /usr/bin/python3
  children:
    attackers:
      hosts:
        kali-attacker:
          # Kali distro runs side-by-side with Ubuntu in WSL2; from Ansible's
          # perspective the same machine, but we keep the logical separation
          # for clarity in playbooks.
          ansible_connection: local
          ansible_python_interpreter: /usr/bin/python3
    targets:
      hosts:
        banking-host:
          ansible_host: 172.28.199.49
          ansible_connection: local
          ansible_user: harsh
