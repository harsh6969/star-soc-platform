title: STAR-002 — Banking SSH Credential Stuffing
id: a2b2c2d2-e2f2-4a2b-8c2d-002200220022
status: experimental
description: >
  Detects 3 or more SSH login attempts using different non-existent
  usernames from the same source IP within 60 seconds. Indicates
  user enumeration or replay of leaked credential dumps against
  banking SSH services. Tuned more sensitively than default rules
  because real users almost never typo a username this many times.
author: Harsh Agarwal
date: 2026/06/23
references:
  - https://attack.mitre.org/techniques/T1110/004/
tags:
  - attack.credential_access
  - attack.t1110.004
  - banking_threats
  - credential_stuffing
  - user_enumeration
logsource:
  product: linux
  service: auth
detection:
  selection:
    process: sshd
    message|contains: 'Invalid user'
  condition: selection | count() by src_ip > 2
  timeframe: 60s
level: high
falsepositives:
  - Misconfigured automation scripts with wrong usernames
  - Scanning tools probing for default service accounts
  - Legacy system using removed user accounts
fields:
  - src_ip
  - dst_user
  - timestamp
